theme: minimal-mistakes-jekyll

minimal_mistakes_skin: "default"

title: "Dron Sharma"
subtitle: "Product Strategy | AI Workflow Automation | GTM Support"
description: "Portfolio showcasing product strategy, AI workflows, market research, and enterprise technical documentation."

author:
  name: "Dron Sharma"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "PGDM @ IILM | Product Strategy + AI Automation"
  location: "New Delhi, India"
  email: "dron.sharma.pgdm26@iilm.edu"
  links:
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/dsmcc/"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/WooliestHydra23"

include:
  - .htaccess
  - _pages

exclude:
  - "*.gemspec"
  - "*.gem"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .bundle

keep_files:
  - .git
  - .gitignore

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Asia/Kolkata

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      classes: wide
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

navigation:
  - title: "Work"
    url: /work/
  - title: "Skills"
    url: /skills/
  - title: "Certifications"
    url: /certifications/
  - title: "Contact"
    url: /contact/

footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/dsmcc/"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/WooliestHydra23"
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:dron.sharma.pgdm26@iilm.edu"

comments:
  provider: false

search: true
search_full_content: true
search_provider: lunr

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
