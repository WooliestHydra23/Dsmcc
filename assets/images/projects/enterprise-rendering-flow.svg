<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #f0f0f0; stroke: #333; stroke-width: 2; }
      .title { font-size: 16px; font-weight: bold; fill: #000; }
      .text { font-size: 12px; fill: #333; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" style="font-size: 24px; font-weight: bold; fill: #000;">Enterprise Cloud Rendering: GTM Support</text>

  <!-- Stage 1: Product Research -->
  <rect x="30" y="80" width="140" height="100" class="box" rx="5"/>
  <text x="100" y="105" text-anchor="middle" class="title">1. Research</text>
  <text x="100" y="130" text-anchor="middle" class="text">Product</text>
  <text x="100" y="145" text-anchor="middle" class="text">Interviews</text>
  <text x="100" y="160" text-anchor="middle" class="text">Capabilities</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="130" x2="210" y2="130" class="arrow"/>

  <!-- Stage 2: Documentation -->
  <rect x="210" y="80" width="140" height="100" class="box" rx="5"/>
  <text x="280" y="105" text-anchor="middle" class="title">2. Documentation</text>
  <text x="280" y="130" text-anchor="middle" class="text">30+ FAQs</text>
  <text x="280" y="145" text-anchor="middle" class="text">8 Tutorials</text>
  <text x="280" y="160" text-anchor="middle" class="text">Framework</text>

  <!-- Arrow 2 -->
  <line x1="350" y1="130" x2="390" y2="130" class="arrow"/>

  <!-- Stage 3: Sales Enablement -->
  <rect x="390" y="80" width="140" height="100" class="box" rx="5"/>
  <text x="460" y="105" text-anchor="middle" class="title">3. Sales Support</text>
  <text x="460" y="130" text-anchor="middle" class="text">Training</text>
  <text x="460" y="145" text-anchor="middle" class="text">Materials</text>
  <text x="460" y="160" text-anchor="middle" class="text">Messaging</text>

  <!-- Arrow 3 -->
  <line x1="530" y1="130" x2="570" y2="130" class="arrow"/>

  <!-- Stage 4: Outcome -->
  <rect x="570" y="80" width="140" height="100" class="box" rx="5"/>
  <text x="640" y="105" text-anchor="middle" class="title">4. Launch Ready</text>
  <text x="640" y="130" text-anchor="middle" class="text">Customer</text>
  <text x="640" y="145" text-anchor="middle" class="text">Clarity</text>
  <text x="640" y="160" text-anchor="middle" class="text">Sales Velocity</text>

  <!-- Impact Metrics -->
  <text x="400" y="280" text-anchor="middle" style="font-size: 14px; font-weight: bold; fill: #333;">Impact Metrics:</text>
  <text x="400" y="310" text-anchor="middle" class="text">30+ FAQ Items | 8 Tutorial Scripts | 3 Team Handoffs | 100% Delivery</text>
  <text x="400" y="340" text-anchor="middle" class="text">Timeline: 4 weeks | Cross-functional: Product, Sales, Support</text>
  <text x="400" y="370" text-anchor="middle" style="font-size: 12px; fill: #666;">Skills: GTM Strategy, Technical Communication, Stakeholder Coordination</text>
</svg>